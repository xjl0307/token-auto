name: 自动更新每日IPTV Token
on:
  schedule:
    - cron: '3 0/2 * * *'  # 每天0点执行
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 执行脚本（带调试）
        run: python get_token.py

      - name: 提交所有文件（含调试文件）
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add cqlt.txt page_source.html || true
          git commit -m "自动更新IPTV订阅 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无变化"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
