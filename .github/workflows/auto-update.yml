name: 自动更新IPTV Token
on:
  schedule:
    - cron: '5 */6 * * *'  # 每小时执行，可调整
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # 解决403权限问题

jobs:
  update-iptv:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装Playwright
        run: |
          python -m pip install --upgrade pip
          python -m pip install playwright
          playwright install chromium --with-deps  # 自动安装系统依赖

      - name: 执行脚本获取Token并筛选
        run: python get_token.py

      - name: 提交更新文件
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add cqlt.txt
          git commit -m "自动更新IPTV订阅 $(date '+%Y-%m-%d %H:%M:%S')" || echo "无内容变化"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
